<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 學習平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .code-area { font-family: 'Courier New', Consolas, monospace; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background-color: #EEF2FF; }
        .sidebar-item.active { background-color: #E0E7FF; color: #4338CA; font-weight: 700; }
        textarea.code-area { tab-size: 4; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- ========== TOAST ========== -->
<div id="toast" class="fixed top-4 right-4 z-50 hidden transition-all">
    <div class="px-6 py-3 rounded-lg shadow-lg text-white text-sm font-medium max-w-sm"></div>
</div>

<!-- ========== LOADING ========== -->
<div id="loading" class="fixed inset-0 bg-black bg-opacity-30 z-40 hidden flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 shadow-xl flex items-center gap-3">
        <svg class="animate-spin h-6 w-6 text-indigo-600" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span class="text-gray-700">載入中...</span>
    </div>
</div>

<!-- ========== CONFIRM MODAL ========== -->
<div id="confirm-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
        <p id="confirm-message" class="text-gray-800 font-medium mb-6"></p>
        <div class="flex justify-end gap-3">
            <button onclick="confirmCancel()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-2 rounded-lg text-sm transition">取消</button>
            <button onclick="confirmOk()" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg text-sm transition">確定</button>
        </div>
    </div>
</div>

<!-- ========== LOGIN PAGE ========== -->
<div id="page-login" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🐍</div>
            <h1 class="text-3xl font-bold text-gray-800">Python 學習平台</h1>
            <p class="text-gray-500 mt-2">請登入你的帳號</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
                <input id="login-username" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="輸入帳號">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                <input id="login-password" type="password" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="輸入密碼">
            </div>
            <div id="login-error" class="text-red-500 text-sm hidden"></div>
            <button onclick="handleLogin()" id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition">登入</button>
            <p class="text-center text-sm text-gray-500">
                還沒有帳號？<a href="#" onclick="showPage('register');return false;" class="text-indigo-600 hover:underline font-medium">立即註冊</a>
            </p>
            <div class="border-t pt-4 mt-4">
                <p class="text-xs text-gray-400 text-center">預設老師帳號：teacher / teacher123</p>
            </div>
        </div>
    </div>
</div>

<!-- ========== REGISTER PAGE ========== -->
<div id="page-register" class="min-h-screen flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📋 註冊帳號</h1>
            <p class="text-gray-500 mt-2">建立你的學習帳號</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">姓名 *</label>
                <input id="reg-name" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="輸入真實姓名">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">帳號 *</label>
                <input id="reg-username" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="輸入帳號（英文或數字）">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密碼 *</label>
                <input id="reg-password" type="password" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="輸入密碼">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">身份</label>
                <select id="reg-role" onchange="toggleClassField()" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white">
                    <option value="student">學生</option>
                    <option value="teacher">老師</option>
                </select>
            </div>
            <div id="reg-class-group">
                <label class="block text-sm font-medium text-gray-700 mb-1">班別</label>
                <input id="reg-class" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="例如：4A">
            </div>
            <button onclick="handleRegister()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition">註冊</button>
            <p class="text-center text-sm text-gray-500">
                已有帳號？<a href="#" onclick="showPage('login');return false;" class="text-indigo-600 hover:underline font-medium">返回登入</a>
            </p>
        </div>
    </div>
</div>

<!-- ========== MAIN APP ========== -->
<div id="page-app" class="hidden min-h-screen">
    <!-- Top Navigation -->
    <nav class="bg-indigo-600 text-white shadow-lg sticky top-0 z-20">
        <div class="px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="menu-toggle" class="lg:hidden p-1 hover:bg-indigo-500 rounded" onclick="toggleSidebar()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <span class="text-lg font-bold">🐍 Python 學習平台</span>
            </div>
            <div class="flex items-center gap-3">
                <span id="nav-user" class="text-sm hidden sm:inline opacity-90"></span>
                <button onclick="logout()" class="bg-indigo-500 hover:bg-indigo-400 px-3 py-1.5 rounded-lg text-sm transition">登出</button>
            </div>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-white shadow-md min-h-screen fixed lg:sticky lg:top-14 z-30 transform -translate-x-full lg:translate-x-0 transition-transform duration-200 overflow-y-auto" style="height: calc(100vh - 56px);">
            <div class="p-4">
                <div id="user-info" class="mb-6 p-4 bg-gradient-to-r from-indigo-50 to-purple-50 rounded-xl">
                    <p id="sidebar-name" class="font-bold text-gray-800 text-lg"></p>
                    <p id="sidebar-role" class="text-sm text-gray-500 mt-1"></p>
                </div>
                <nav id="sidebar-nav" class="space-y-1"></nav>
            </div>
        </aside>

        <!-- Sidebar overlay (mobile) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <main class="flex-1 p-4 lg:p-8 w-full min-w-0">
            <div class="max-w-5xl mx-auto">

                <!-- ===== DASHBOARD ===== -->
                <div id="view-dashboard" class="hidden fade-in">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">📊 儀表板</h2>
                    <div id="dashboard-stats" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8"></div>
                    <div class="bg-white rounded-xl shadow-md p-6">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">📋 最近功課</h3>
                        <div id="dashboard-recent"></div>
                    </div>
                </div>

                <!-- ===== TEACHER: MANAGE ASSIGNMENTS ===== -->
                <div id="view-manage-assignments" class="hidden fade-in">
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                        <h2 class="text-2xl font-bold text-gray-800">📝 功課管理</h2>
                        <button onclick="showCreateForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            新增功課
                        </button>
                    </div>
                    <!-- Create Form -->
                    <div id="create-form" class="hidden bg-white rounded-xl shadow-md p-6 mb-6 fade-in border-l-4 border-indigo-500">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">新增功課</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">功課標題 *</label>
                                <input id="new-title" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="例如：Python 變數練習">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">功課說明</label>
                                <textarea id="new-desc" rows="8" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500 transition code-area text-sm" placeholder="輸入功課說明、要求和範例程式碼..."></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">截止日期</label>
                                <input id="new-due" type="date" class="w-full max-w-xs border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                            </div>
                            <div class="flex gap-3 pt-2">
                                <button onclick="createAssignment()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition">建立功課</button>
                                <button onclick="hideCreateForm()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg text-sm transition">取消</button>
                            </div>
                        </div>
                    </div>
                    <div id="assignments-list" class="space-y-4"></div>
                </div>

                <!-- ===== TEACHER: GRADING ===== -->
                <div id="view-grading" class="hidden fade-in">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">✅ 批改功課</h2>
                    <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">選擇要批改的功課</label>
                        <select id="grading-select" onchange="loadSubmissionsForGrading()" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500 transition bg-white">
                            <option value="">-- 請選擇 --</option>
                        </select>
                    </div>
                    <div id="submissions-list" class="space-y-4"></div>
                </div>

                <!-- ===== TEACHER: STUDENTS ===== -->
                <div id="view-students" class="hidden fade-in">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">👥 學生列表</h2>
                    <div id="students-table" class="bg-white rounded-xl shadow-md overflow-hidden"></div>
                </div>

                <!-- ===== STUDENT: MY ASSIGNMENTS ===== -->
                <div id="view-my-assignments" class="hidden fade-in">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">📝 我的功課</h2>
                    <div id="my-assignments-list" class="space-y-4"></div>
                </div>

                <!-- ===== STUDENT: MY GRADES ===== -->
                <div id="view-my-grades" class="hidden fade-in">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">📈 成績查看</h2>
                    <div id="my-grades-content"></div>
                </div>

            </div>
        </main>
    </div>
</div>

<!-- ========== SUBMIT MODAL (Student) ========== -->
<div id="submit-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-full overflow-y-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 id="modal-title" class="text-xl font-bold text-gray-800"></h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="modal-desc" class="bg-gray-50 rounded-lg p-4 mb-4 text-sm text-gray-700 whitespace-pre-wrap max-h-48 overflow-y-auto"></div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">你的答案 / 程式碼</label>
                <textarea id="modal-answer" rows="14" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 transition code-area text-sm" placeholder="在這裡輸入你的 Python 程式碼..."></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-4">
                <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg text-sm transition">取消</button>
                <button onclick="submitWork()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition">📤 提交功課</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// ⚙️  請在下面貼上你的 Google Apps Script 網頁應用程式 URL
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxx8bv705C29rU2uH81w1qSiO7NiS-gJSUl4E_8cPWgXUs4HUe1fKeA7LOPl_aHM6FK/exec';
// ============================================================

// ==================== STATE ====================
let currentUser = null;
let cachedAssignments = [];
let cachedMySubmissions = {};
let currentModalAssignmentId = null;
let confirmResolve = null;

// ==================== API ====================
async function api(action, data) {
    data = data || {};
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            redirect: 'follow',
            body: JSON.stringify(Object.assign({ action: action }, data))
        });
        return await res.json();
    } catch (err) {
        console.error('API Error:', err);
        return { success: false, message: '網絡錯誤，請稍後再試' };
    }
}

// ==================== UI HELPERS ====================
function showToast(msg, type) {
    type = type || 'success';
    var toast = document.getElementById('toast');
    var inner = toast.querySelector('div');
    inner.textContent = msg;
    inner.className = 'px-6 py-3 rounded-lg shadow-lg text-white text-sm font-medium ' +
        (type === 'error' ? 'bg-red-500' : type === 'info' ? 'bg-blue-500' : 'bg-green-500');
    toast.classList.remove('hidden');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function() { toast.classList.add('hidden'); }, 3500);
}

function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

function showPage(name) {
    ['page-login','page-register','page-app'].forEach(function(id) {
        document.getElementById(id).classList.add('hidden');
    });
    document.getElementById('page-' + name).classList.remove('hidden');
}

function showView(name) {
    var views = document.querySelectorAll('[id^="view-"]');
    for (var i = 0; i < views.length; i++) { views[i].classList.add('hidden'); }
    var el = document.getElementById('view-' + name);
    if (el) { el.classList.remove('hidden'); }
    var items = document.querySelectorAll('.sidebar-item');
    for (var j = 0; j < items.length; j++) {
        items[j].classList.toggle('active', items[j].dataset.view === name);
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('-translate-x-full');
    document.getElementById('sidebar-overlay').classList.toggle('hidden');
}

function toggleClassField() {
    var role = document.getElementById('reg-role').value;
    document.getElementById('reg-class-group').style.display = role === 'student' ? 'block' : 'none';
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    var div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
}

function formatDate(d) {
    if (!d) return '-';
    try {
        var date = new Date(d);
        if (isNaN(date.getTime())) return String(d);
        return date.getFullYear() + '/' + (date.getMonth()+1) + '/' + date.getDate();
    } catch(e) { return String(d); }
}

function hasScore(s) {
    return s.score !== '' && s.score !== null && s.score !== undefined;
}

// Custom confirm dialog
function customConfirm(msg) {
    return new Promise(function(resolve) {
        document.getElementById('confirm-message').textContent = msg;
        document.getElementById('confirm-modal').classList.remove('hidden');
        confirmResolve = resolve;
    });
}
function confirmOk() {
    document.getElementById('confirm-modal').classList.add('hidden');
    if (confirmResolve) confirmResolve(true);
    confirmResolve = null;
}
function confirmCancel() {
    document.getElementById('confirm-modal').classList.add('hidden');
    if (confirmResolve) confirmResolve(false);
    confirmResolve = null;
}

// ==================== AUTH ====================
async function handleLogin() {
    var username = document.getElementById('login-username').value.trim();
    var password = document.getElementById('login-password').value.trim();
    if (!username || !password) { showToast('請輸入帳號和密碼', 'error'); return; }

    showLoading();
    var result = await api('login', { username: username, password: password });
    hideLoading();

    if (result.success) {
        currentUser = result.user;
        showToast('歡迎回來，' + currentUser.name + '！');
        initApp();
    } else {
        showToast(result.message || '登入失敗', 'error');
    }
}

async function handleRegister() {
    var name = document.getElementById('reg-name').value.trim();
    var username = document.getElementById('reg-username').value.trim();
    var password = document.getElementById('reg-password').value.trim();
    var role = document.getElementById('reg-role').value;
    var studentClass = document.getElementById('reg-class').value.trim();

    if (!name || !username || !password) { showToast('請填寫所有必填欄位', 'error'); return; }

    showLoading();
    var result = await api('register', { name:name, username:username, password:password, role:role, studentClass:studentClass });
    hideLoading();

    if (result.success) {
        showToast('註冊成功！請登入');
        showPage('login');
        document.getElementById('login-username').value = username;
    } else {
        showToast(result.message || '註冊失敗', 'error');
    }
}

function logout() {
    currentUser = null;
    cachedAssignments = [];
    cachedMySubmissions = {};
    showPage('login');
}

// ==================== INIT APP ====================
function initApp() {
    showPage('app');
    document.getElementById('nav-user').textContent = currentUser.name + '（' + (currentUser.role === 'teacher' ? '老師' : '學生') + '）';
    document.getElementById('sidebar-name').textContent = currentUser.name;
    document.getElementById('sidebar-role').textContent = currentUser.role === 'teacher'
        ? '👨‍🏫 老師'
        : '👨‍🎓 學生' + (currentUser.class ? ' - ' + currentUser.class : '');

    var menuItems = currentUser.role === 'teacher' ? [
        { view:'dashboard', icon:'📊', label:'儀表板' },
        { view:'manage-assignments', icon:'📝', label:'功課管理' },
        { view:'grading', icon:'✅', label:'批改功課' },
        { view:'students', icon:'👥', label:'學生列表' }
    ] : [
        { view:'dashboard', icon:'📊', label:'儀表板' },
        { view:'my-assignments', icon:'📝', label:'我的功課' },
        { view:'my-grades', icon:'📈', label:'成績查看' }
    ];

    var nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';
    menuItems.forEach(function(item) {
        var btn = document.createElement('button');
        btn.className = 'sidebar-item w-full text-left px-4 py-3 rounded-lg text-gray-700 font-medium flex items-center gap-3';
        btn.dataset.view = item.view;
        btn.innerHTML = '<span class="text-lg">' + item.icon + '</span><span>' + item.label + '</span>';
        btn.onclick = function() {
            navigateTo(item.view);
            if (window.innerWidth < 1024) toggleSidebar();
        };
        nav.appendChild(btn);
    });

    navigateTo('dashboard');
}

async function navigateTo(view) {
    showView(view);
    switch(view) {
        case 'dashboard': await loadDashboard(); break;
        case 'manage-assignments': await loadAssignments(); break;
        case 'grading': await loadGradingPage(); break;
        case 'students': await loadStudents(); break;
        case 'my-assignments': await loadMyAssignments(); break;
        case 'my-grades': await loadMyGrades(); break;
    }
}

// ==================== DASHBOARD ====================
async function loadDashboard() {
    showLoading();
    var aResult = await api('getAssignments');
    var assignments = aResult.success ? aResult.assignments : [];
    var stats = [];

    if (currentUser.role === 'teacher') {
        var sResult = await api('getStudents');
        var students = sResult.success ? sResult.students : [];
        stats = [
            { label:'總功課數', value:assignments.length, icon:'📝', bg:'bg-blue-50', text:'text-blue-600' },
            { label:'學生人數', value:students.length, icon:'👥', bg:'bg-green-50', text:'text-green-600' },
            { label:'最近新增', value: assignments.length > 0 ? escapeHtml(assignments[assignments.length-1].title) : '—', icon:'📋', bg:'bg-purple-50', text:'text-purple-600', small:true }
        ];
    } else {
        var mResult = await api('getMySubmissions', { username: currentUser.username });
        var mySubs = mResult.success ? mResult.submissions : [];
        var graded = mySubs.filter(hasScore);
        var avg = graded.length > 0 ? Math.round(graded.reduce(function(s,x){ return s + Number(x.score); }, 0) / graded.length) : '—';
        stats = [
            { label:'總功課數', value:assignments.length, icon:'📝', bg:'bg-blue-50', text:'text-blue-600' },
            { label:'已提交', value:mySubs.length, icon:'✅', bg:'bg-green-50', text:'text-green-600' },
            { label:'平均分數', value:avg, icon:'📈', bg:'bg-purple-50', text:'text-purple-600' }
        ];
    }

    document.getElementById('dashboard-stats').innerHTML = stats.map(function(s) {
        return '<div class="bg-white rounded-xl shadow-md p-6"><div class="flex items-center justify-between"><div>' +
            '<p class="text-sm text-gray-500">' + s.label + '</p>' +
            '<p class="' + (s.small ? 'text-lg truncate max-w-xs' : 'text-3xl') + ' font-bold text-gray-800 mt-1">' + s.value + '</p>' +
            '</div><div class="text-4xl ' + s.bg + ' ' + s.text + ' p-3 rounded-xl">' + s.icon + '</div></div></div>';
    }).join('');

    var recent = assignments.slice(-5).reverse();
    document.getElementById('dashboard-recent').innerHTML = recent.length === 0
        ? '<p class="text-gray-400 text-sm">暫無功課</p>'
        : recent.map(function(a) {
            return '<div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">' +
                '<div><p class="font-medium text-gray-800">' + escapeHtml(a.title) + '</p>' +
                '<p class="text-sm text-gray-400">截止：' + formatDate(a.dueDate) + '</p></div></div>';
        }).join('');

    hideLoading();
}

// ==================== TEACHER: ASSIGNMENTS ====================
function showCreateForm() { document.getElementById('create-form').classList.remove('hidden'); }
function hideCreateForm() {
    document.getElementById('create-form').classList.add('hidden');
    document.getElementById('new-title').value = '';
    document.getElementById('new-desc').value = '';
    document.getElementById('new-due').value = '';
}

async function loadAssignments() {
    showLoading();
    var result = await api('getAssignments');
    hideLoading();
    if (!result.success) { showToast(result.message, 'error'); return; }

    cachedAssignments = result.assignments;
    var list = document.getElementById('assignments-list');

    if (result.assignments.length === 0) {
        list.innerHTML = '<div class="bg-white rounded-xl shadow-md p-8 text-center text-gray-400">暫無功課，點擊上方按鈕新增</div>';
        return;
    }

    list.innerHTML = result.assignments.slice().reverse().map(function(a) {
        return '<div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition">' +
            '<div class="flex items-start justify-between gap-4">' +
            '<div class="flex-1 min-w-0">' +
            '<h3 class="text-lg font-bold text-gray-800">' + escapeHtml(a.title) + '</h3>' +
            '<p class="text-sm text-gray-400 mt-1">截止：' + formatDate(a.dueDate) + ' ｜ 建立：' + formatDate(a.createdAt) + '</p>' +
            (a.description ? '<pre class="mt-3 text-sm text-gray-600 whitespace-pre-wrap bg-gray-50 rounded-lg p-4 overflow-x-auto">' + escapeHtml(a.description) + '</pre>' : '') +
            '</div>' +
            '<button onclick="handleDelete(\'' + a.id + '\')" class="text-gray-300 hover:text-red-500 transition flex-shrink-0 mt-1" title="刪除">' +
            '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>' +
            '</button></div></div>';
    }).join('');
}

async function createAssignment() {
    var title = document.getElementById('new-title').value.trim();
    var desc = document.getElementById('new-desc').value.trim();
    var due = document.getElementById('new-due').value;
    if (!title) { showToast('請輸入功課標題', 'error'); return; }

    showLoading();
    var result = await api('createAssignment', { title:title, description:desc, dueDate:due, createdBy:currentUser.username });
    hideLoading();

    if (result.success) {
        showToast('功課已建立！');
        hideCreateForm();
        await loadAssignments();
    } else {
        showToast(result.message, 'error');
    }
}

async function handleDelete(id) {
    var ok = await customConfirm('確定要刪除此功課嗎？此操作無法復原。');
    if (!ok) return;

    showLoading();
    var result = await api('deleteAssignment', { id: id });
    hideLoading();

    if (result.success) {
        showToast('功課已刪除');
        await loadAssignments();
    } else {
        showToast(result.message, 'error');
    }
}

// ==================== TEACHER: GRADING ====================
async function loadGradingPage() {
    showLoading();
    var result = await api('getAssignments');
    hideLoading();

    var select = document.getElementById('grading-select');
    select.innerHTML = '<option value="">-- 請選擇功課 --</option>';
    if (result.success) {
        result.assignments.slice().reverse().forEach(function(a) {
            select.innerHTML += '<option value="' + a.id + '">' + escapeHtml(a.title) + '（截止：' + formatDate(a.dueDate) + '）</option>';
        });
    }
    document.getElementById('submissions-list').innerHTML = '';
}

async function loadSubmissionsForGrading() {
    var aid = document.getElementById('grading-select').value;
    var list = document.getElementById('submissions-list');
    if (!aid) { list.innerHTML = ''; return; }

    showLoading();
    var result = await api('getSubmissions', { assignmentId: aid });
    hideLoading();

    if (!result.success || result.submissions.length === 0) {
        list.innerHTML = '<div class="bg-white rounded-xl shadow-md p-8 text-center text-gray-400">暫無學生提交</div>';
        return;
    }

    list.innerHTML = result.submissions.map(function(s) {
        var scored = hasScore(s);
        return '<div class="bg-white rounded-xl shadow-md p-6 ' + (scored ? 'border-l-4 border-green-400' : 'border-l-4 border-yellow-400') + '">' +
            '<div class="flex flex-wrap items-center justify-between gap-2 mb-3">' +
            '<div><span class="font-bold text-gray-800">' + escapeHtml(s.studentName) + '</span>' +
            '<span class="text-sm text-gray-400 ml-2">(' + escapeHtml(s.username) + ')</span></div>' +
            '<span class="text-xs text-gray-400">提交：' + formatDate(s.submittedAt) + '</span></div>' +
            '<pre class="bg-gray-900 text-green-400 rounded-lg p-4 text-sm overflow-x-auto mb-4 whitespace-pre-wrap max-h-64 overflow-y-auto">' + escapeHtml(s.answer) + '</pre>' +
            '<div class="flex flex-wrap items-end gap-3">' +
            '<div><label class="block text-xs font-medium text-gray-500 mb-1">分數 (0-100)</label>' +
            '<input type="number" id="score-' + s.id + '" min="0" max="100" value="' + (scored ? s.score : '') + '" class="w-24 border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="分數"></div>' +
            '<div class="flex-1 min-w-0"><label class="block text-xs font-medium text-gray-500 mb-1">評語</label>' +
            '<input type="text" id="fb-' + s.id + '" value="' + escapeHtml(s.feedback || '') + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="輸入評語..."></div>' +
            '<button onclick="gradeOne(\'' + s.id + '\')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap">' +
            (scored ? '✏️ 更新' : '✅ 評分') + '</button></div>' +
            (s.gradedAt ? '<p class="text-xs text-gray-300 mt-2">上次評分：' + formatDate(s.gradedAt) + '</p>' : '') +
            '</div>';
    }).join('');
}

async function gradeOne(sid) {
    var scoreEl = document.getElementById('score-' + sid);
    var fbEl = document.getElementById('fb-' + sid);
    if (!scoreEl || scoreEl.value === '') { showToast('請輸入分數', 'error'); return; }

    showLoading();
    var result = await api('gradeSubmission', { submissionId: sid, score: Number(scoreEl.value), feedback: fbEl.value });
    hideLoading();

    if (result.success) {
        showToast('已評分！');
        await loadSubmissionsForGrading();
    } else {
        showToast(result.message, 'error');
    }
}

// ==================== TEACHER: STUDENTS ====================
async function loadStudents() {
    showLoading();
    var result = await api('getStudents');
    hideLoading();

    var el = document.getElementById('students-table');
    if (!result.success || result.students.length === 0) {
        el.innerHTML = '<div class="p-8 text-center text-gray-400">暫無學生註冊</div>';
        return;
    }

    el.innerHTML = '<div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr>' +
        '<th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">#</th>' +
        '<th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">姓名</th>' +
        '<th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">帳號</th>' +
        '<th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">班別</th>' +
        '</tr></thead><tbody class="divide-y divide-gray-100">' +
        result.students.map(function(s, i) {
            return '<tr class="hover:bg-gray-50 transition">' +
                '<td class="px-6 py-4 text-sm text-gray-400">' + (i+1) + '</td>' +
                '<td class="px-6 py-4 text-sm font-medium text-gray-800">' + escapeHtml(s.name) + '</td>' +
                '<td class="px-6 py-4 text-sm text-gray-500">' + escapeHtml(s.username) + '</td>' +
                '<td class="px-6 py-4 text-sm text-gray-500">' + escapeHtml(s.class || '-') + '</td></tr>';
        }).join('') +
        '</tbody></table></div>';
}

// ==================== STUDENT: MY ASSIGNMENTS ====================
async function loadMyAssignments() {
    showLoading();
    var results = await Promise.all([
        api('getAssignments'),
        api('getMySubmissions', { username: currentUser.username })
    ]);
    hideLoading();

    cachedAssignments = results[0].success ? results[0].assignments : [];
    var subs = results[1].success ? results[1].submissions : [];
    cachedMySubmissions = {};
    subs.forEach(function(s) { cachedMySubmissions[s.assignmentId] = s; });

    var list = document.getElementById('my-assignments-list');
    if (cachedAssignments.length === 0) {
        list.innerHTML = '<div class="bg-white rounded-xl shadow-md p-8 text-center text-gray-400">暫無功課</div>';
        return;
    }

    list.innerHTML = cachedAssignments.slice().reverse().map(function(a) {
        var sub = cachedMySubmissions[a.id];
        var badge;
        if (sub && hasScore(sub)) {
            badge = '<span class="bg-green-100 text-green-700 text-xs font-semibold px-3 py-1 rounded-full">已批改 ' + sub.score + '分</span>';
        } else if (sub) {
            badge = '<span class="bg-yellow-100 text-yellow-700 text-xs font-semibold px-3 py-1 rounded-full">已提交，待批改</span>';
        } else {
            badge = '<span class="bg-red-100 text-red-700 text-xs font-semibold px-3 py-1 rounded-full">未提交</span>';
        }

        var html = '<div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition">' +
            '<div class="flex flex-wrap items-start justify-between gap-2 mb-2">' +
            '<h3 class="text-lg font-bold text-gray-800">' + escapeHtml(a.title) + '</h3>' + badge + '</div>' +
            '<p class="text-sm text-gray-400 mb-3">截止日期：' + formatDate(a.dueDate) + '</p>';

        if (a.description) {
            html += '<pre class="text-sm text-gray-600 whitespace-pre-wrap bg-gray-50 rounded-lg p-4 mb-4 overflow-x-auto">' + escapeHtml(a.description) + '</pre>';
        }

        if (sub) {
            html += '<details class="mb-4"><summary class="text-sm text-indigo-600 cursor-pointer hover:underline font-medium">查看我的提交</summary>' +
                '<pre class="bg-gray-900 text-green-400 rounded-lg p-4 text-sm mt-2 whitespace-pre-wrap overflow-x-auto max-h-48 overflow-y-auto">' + escapeHtml(sub.answer) + '</pre>';
            if (sub.feedback) {
                html += '<p class="text-sm text-indigo-600 mt-2 bg-indigo-50 p-3 rounded-lg">💬 老師評語：' + escapeHtml(sub.feedback) + '</p>';
            }
            html += '</details>';
        }

        html += '<button onclick="openModal(\'' + a.id + '\')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition">' +
            (sub ? '📝 重新提交' : '📤 提交功課') + '</button></div>';

        return html;
    }).join('');
}

function openModal(assignmentId) {
    var a = cachedAssignments.find(function(x) { return x.id === assignmentId; });
    if (!a) return;
    var sub = cachedMySubmissions[assignmentId];
    currentModalAssignmentId = assignmentId;
    document.getElementById('modal-title').textContent = a.title;
    document.getElementById('modal-desc').textContent = a.description || '（無說明）';
    document.getElementById('modal-answer').value = sub ? sub.answer : '';
    document.getElementById('submit-modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('submit-modal').classList.add('hidden');
    currentModalAssignmentId = null;
}

async function submitWork() {
    var answer = document.getElementById('modal-answer').value.trim();
    if (!answer) { showToast('請輸入你的答案', 'error'); return; }

    showLoading();
    var result = await api('submitWork', {
        assignmentId: currentModalAssignmentId,
        username: currentUser.username,
        answer: answer
    });
    hideLoading();

    if (result.success) {
        showToast('功課已提交！👍');
        closeModal();
        await loadMyAssignments();
    } else {
        showToast(result.message, 'error');
    }
}

// ==================== STUDENT: MY GRADES ====================
async function loadMyGrades() {
    showLoading();
    var result = await api('getMySubmissions', { username: currentUser.username });
    hideLoading();

    var el = document.getElementById('my-grades-content');
    if (!result.success || result.submissions.length === 0) {
        el.innerHTML = '<div class="bg-white rounded-xl shadow-md p-8 text-center text-gray-400">暫無提交紀錄</div>';
        return;
    }

    var graded = result.submissions.filter(hasScore);
    var avg = graded.length > 0 ? Math.round(graded.reduce(function(s,x){ return s + Number(x.score); }, 0) / graded.length) : null;
    var highest = graded.length > 0 ? Math.max.apply(null, graded.map(function(x){ return Number(x.score); })) : null;

    var html = '';
    if (avg !== null) {
        html += '<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">' +
            '<div class="bg-white rounded-xl shadow-md p-5 text-center"><p class="text-sm text-gray-500">平均分數</p><p class="text-3xl font-bold text-indigo-600 mt-1">' + avg + '</p></div>' +
            '<div class="bg-white rounded-xl shadow-md p-5 text-center"><p class="text-sm text-gray-500">最高分數</p><p class="text-3xl font-bold text-green-600 mt-1">' + highest + '</p></div>' +
            '<div class="bg-white rounded-xl shadow-md p-5 text-center"><p class="text-sm text-gray-500">已批改</p><p class="text-3xl font-bold text-gray-800 mt-1">' + graded.length + '/' + result.submissions.length + '</p></div>' +
            '</div>';
    }

    html += '<div class="bg-white rounded-xl shadow-md overflow-hidden"><div class="overflow-x-auto">' +
        '<table class="w-full"><thead class="bg-gray-50"><tr>' +
        '<th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">功課</th>' +
        '<th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">提交時間</th>' +
        '<th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">分數</th>' +
        '<th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">評語</th>' +
        '</tr></thead><tbody class="divide-y divide-gray-100">' +
        result.submissions.map(function(s) {
            var scoreHtml = hasScore(s)
                ? '<span class="inline-block px-3 py-1 rounded-full text-sm font-bold ' + (Number(s.score) >= 60 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700') + '">' + s.score + '</span>'
                : '<span class="text-yellow-500 text-sm">待批改</span>';
            return '<tr class="hover:bg-gray-50 transition">' +
                '<td class="px-4 py-4 text-sm font-medium text-gray-800">' + escapeHtml(s.assignmentTitle) + '</td>' +
                '<td class="px-4 py-4 text-sm text-gray-400">' + formatDate(s.submittedAt) + '</td>' +
                '<td class="px-4 py-4 text-center">' + scoreHtml + '</td>' +
                '<td class="px-4 py-4 text-sm text-gray-600">' + escapeHtml(s.feedback || '-') + '</td></tr>';
        }).join('') +
        '</tbody></table></div></div>';

    el.innerHTML = html;
}
