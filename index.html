<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSE ICT Python 學習系統</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pri:#4361ee;--pri-dark:#3a56d4;--sec:#7209b7;--accent:#4cc9f0;--success:#06d6a0;--warn:#ffd166;--danger:#ef476f;--bg:#f0f2f5;--card:#fff;--text:#2b2d42;--text-light:#8d99ae;--sidebar-w:260px;--radius:12px;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.hidden{display:none!important;}
a{color:var(--pri);text-decoration:none;}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit;}
input,select,textarea{font-family:inherit;font-size:14px;}

.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4361ee 0%,#7209b7 100%);padding:20px;}
.login-box{background:#fff;border-radius:var(--radius);padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-box h1{text-align:center;color:var(--pri);margin-bottom:8px;font-size:24px;}
.login-box .subtitle{text-align:center;color:var(--text-light);margin-bottom:30px;font-size:14px;}
.login-box .logo{text-align:center;font-size:48px;margin-bottom:16px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:14px;color:#555;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;transition:.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pri);outline:none;box-shadow:0 0 0 3px rgba(67,97,238,.15);}
.form-group .hint{font-size:12px;color:var(--text-light);margin-top:4px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;transition:.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-pri{background:var(--pri);color:#fff;}.btn-pri:hover{background:var(--pri-dark);}
.btn-sec{background:var(--sec);color:#fff;}.btn-sec:hover{background:#5c078f;}
.btn-success{background:var(--success);color:#fff;}.btn-success:hover{background:#05b88a;}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#d63d60;}
.btn-warn{background:var(--warn);color:#333;}.btn-warn:hover{background:#f0c040;}
.btn-outline{background:transparent;color:var(--pri);border:2px solid var(--pri);}.btn-outline:hover{background:var(--pri);color:#fff;}
.btn-outline-danger{background:transparent;color:var(--danger);border:2px solid var(--danger);}.btn-outline-danger:hover{background:var(--danger);color:#fff;}
.btn-full{width:100%;justify-content:center;padding:12px;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}
.btn-icon{padding:6px 8px;border-radius:6px;font-size:12px;}
.btn-group{display:flex;gap:4px;flex-wrap:wrap;}

.preview-bar{background:linear-gradient(90deg,#f72585,#7209b7);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600;position:sticky;top:0;z-index:999;flex-wrap:wrap;gap:8px;box-shadow:0 2px 12px rgba(247,37,133,.3);}
.preview-bar .preview-label{display:flex;align-items:center;gap:8px;}
.preview-bar .preview-label i{font-size:18px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.preview-bar .btn-back{background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.5);padding:6px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;}
.preview-bar .btn-back:hover{background:rgba(255,255,255,.35);}
.preview-bar select{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:6px;padding:4px 8px;font-size:13px;cursor:pointer;}
.preview-bar select option{color:#333;background:#fff;}

.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#2b2d42 0%,#1a1b2e 100%);color:#fff;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;transition:transform .3s;}
.sidebar-header{padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-header h2{font-size:16px;margin-bottom:4px;}
.sidebar-header small{color:rgba(255,255,255,.5);font-size:12px;}
.sidebar-header .role-badge{display:inline-block;margin-top:6px;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;}
.role-admin{background:rgba(239,71,111,.2);color:#ef476f;}
.role-teacher{background:rgba(67,97,238,.2);color:#4cc9f0;}
.sidebar-nav{padding:12px 0;}
.nav-section{padding:6px 20px 4px;font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;margin-top:6px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:rgba(255,255,255,.7);cursor:pointer;transition:.2s;font-size:14px;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(67,97,238,.2);color:var(--accent);border-left-color:var(--accent);}
.nav-item i{width:20px;text-align:center;}
.nav-item.preview-switch{background:rgba(247,37,133,.15);color:#f72585;border-left-color:#f72585;}
.nav-item.preview-switch:hover{background:rgba(247,37,133,.25);color:#ff6eb4;}
.sidebar-footer{position:absolute;bottom:0;width:100%;padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
.main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;}
.topbar{background:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.08);position:sticky;top:0;z-index:50;}
.topbar h2{font-size:18px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg);border-radius:20px;font-size:13px;}
.user-badge.preview{background:linear-gradient(90deg,rgba(247,37,133,.1),rgba(114,9,183,.1));border:1px dashed #f72585;}
.content-area{padding:24px;}
.hamburger{display:none;background:none;font-size:20px;color:var(--text);}

.card{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px;}
.card h3{font-size:16px;margin-bottom:12px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:16px;}
.stat-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
.stat-icon.blue{background:linear-gradient(135deg,#4361ee,#4cc9f0);}
.stat-icon.green{background:linear-gradient(135deg,#06d6a0,#1b9aaa);}
.stat-icon.purple{background:linear-gradient(135deg,#7209b7,#b5179e);}
.stat-icon.orange{background:linear-gradient(135deg,#f72585,#ffd166);}
.stat-icon.red{background:linear-gradient(135deg,#e63946,#ef476f);}

.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.topic-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:.2s;border-left:4px solid var(--pri);position:relative;overflow:hidden;}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.topic-card h4{font-size:15px;margin-bottom:6px;}
.topic-card p{font-size:13px;color:var(--text-light);margin-bottom:12px;}
.topic-card .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.badge-blue{background:rgba(67,97,238,.1);color:var(--pri);}
.badge-green{background:rgba(6,214,160,.1);color:#05a67c;}

.quiz-container{max-width:800px;margin:0 auto;}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.quiz-progress{width:100%;height:8px;background:#e0e0e0;border-radius:4px;margin-bottom:20px;overflow:hidden;}
.quiz-progress-bar{height:100%;background:linear-gradient(90deg,var(--pri),var(--accent));border-radius:4px;transition:.3s;}
.question-card{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px;}
.question-num{display:inline-block;background:var(--pri);color:#fff;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;margin-bottom:12px;}
.question-text{font-size:15px;line-height:1.7;margin-bottom:16px;white-space:pre-wrap;}
.question-text code,.code-block{background:#2b2d42;color:#a8e6cf;padding:2px 6px;border-radius:4px;font-family:'Consolas','Monaco','Courier New',monospace;font-size:13px;}
.code-block{display:block;padding:16px;border-radius:8px;margin:12px 0;white-space:pre;overflow-x:auto;line-height:1.6;}
.options{display:flex;flex-direction:column;gap:10px;}
.option{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:2px solid #e8e8e8;border-radius:8px;cursor:pointer;transition:.2s;font-size:14px;line-height:1.5;}
.option:hover{border-color:var(--pri);background:rgba(67,97,238,.03);}
.option.selected{border-color:var(--pri);background:rgba(67,97,238,.08);}
.option.correct{border-color:var(--success);background:rgba(6,214,160,.08);}
.option.wrong{border-color:var(--danger);background:rgba(239,71,111,.08);}
.option-letter{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.option.selected .option-letter{background:var(--pri);color:#fff;}
.option.correct .option-letter{background:var(--success);color:#fff;}
.option.wrong .option-letter{background:var(--danger);color:#fff;}
.answer-input{width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-family:'Consolas',monospace;font-size:14px;}
.explanation{background:#f8f9fa;border-left:4px solid var(--pri);padding:12px 16px;border-radius:0 8px 8px 0;margin-top:12px;font-size:13px;line-height:1.6;}

.code-editor-wrapper{border:2px solid #e0e0e0;border-radius:8px;overflow:hidden;}
.code-editor{width:100%;min-height:200px;padding:16px;font-family:'Consolas','Monaco','Courier New',monospace;font-size:14px;line-height:1.6;border:none;resize:vertical;background:#1e1e2e;color:#cdd6f4;outline:none;}
.code-output{background:#1e1e2e;color:#a6e3a1;padding:16px;border-radius:8px;font-family:'Consolas',monospace;font-size:13px;min-height:60px;white-space:pre-wrap;margin-top:8px;max-height:200px;overflow-y:auto;}
.code-output.error{color:#f38ba8;}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #eee;}
th{background:#f8f9fa;font-weight:600;color:#555;font-size:13px;white-space:nowrap;}
tr:hover td{background:#f8f9fa;}
.score-high{color:var(--success);font-weight:700;}
.score-mid{color:var(--warn);font-weight:700;}
.score-low{color:var(--danger);font-weight:700;}

.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid #eee;flex-wrap:wrap;}
.tab{padding:10px 18px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--pri);border-bottom-color:var(--pri);}
.tab .tab-count{background:var(--bg);padding:1px 7px;border-radius:10px;font-size:11px;}
.tab.active .tab-count{background:rgba(67,97,238,.1);color:var(--pri);}

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:var(--radius);padding:30px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h3{margin-bottom:20px;font-size:18px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
.modal-section{background:#f8f9fa;border-radius:8px;padding:16px;margin-bottom:16px;}
.modal-section h4{font-size:14px;color:#555;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.modal-divider{border:none;border-top:1px solid #eee;margin:16px 0;}

.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{padding:14px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;animation:slideIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:350px;}
.toast-success{background:var(--success);}.toast-error{background:var(--danger);}.toast-info{background:var(--pri);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}

.result-summary{text-align:center;padding:40px 20px;}
.result-score{font-size:64px;font-weight:800;margin:20px 0;}
.result-score.high{color:var(--success);}.result-score.mid{color:var(--warn);}.result-score.low{color:var(--danger);}
.result-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px;}
.result-circle.high{background:rgba(6,214,160,.15);color:var(--success);}
.result-circle.mid{background:rgba(255,209,102,.15);color:#e6a800;}
.result-circle.low{background:rgba(239,71,111,.15);color:var(--danger);}

.assign-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-left:4px solid var(--pri);}
.assign-info h4{font-size:15px;margin-bottom:4px;}
.assign-info p{font-size:13px;color:var(--text-light);}
.assign-meta{display:flex;gap:16px;font-size:12px;color:var(--text-light);margin-top:6px;flex-wrap:wrap;}

.student-info-card{display:flex;align-items:center;gap:16px;padding:16px;background:linear-gradient(135deg,rgba(67,97,238,.05),rgba(114,9,183,.05));border-radius:10px;margin-bottom:16px;}
.student-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--sec));display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;flex-shrink:0;}
.student-avatar.admin-av{background:linear-gradient(135deg,#e63946,#ef476f);}
.student-avatar.teacher-av{background:linear-gradient(135deg,#f72585,#ffd166);}
.student-meta{font-size:13px;color:var(--text-light);}
.student-meta span{display:block;margin-top:2px;}
.password-field{display:flex;align-items:center;gap:8px;}
.password-field input{flex:1;}
.password-toggle{background:none;border:2px solid #e0e0e0;border-radius:8px;padding:10px 14px;cursor:pointer;color:var(--text-light);transition:.2s;}
.password-toggle:hover{border-color:var(--pri);color:var(--pri);}

.perm-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;}
.perm-admin{background:rgba(239,71,111,.1);color:#ef476f;}
.perm-teacher{background:rgba(67,97,238,.1);color:var(--pri);}
.perm-student{background:rgba(6,214,160,.1);color:#05a67c;}

.student-picker{border:2px solid #e0e0e0;border-radius:8px;overflow:hidden;}
.student-picker-header{display:flex;gap:8px;padding:10px;background:#f8f9fa;border-bottom:1px solid #eee;flex-wrap:wrap;align-items:center;}
.student-picker-header input{flex:1;min-width:120px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;}
.student-picker-header select{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;min-width:90px;}
.student-picker-actions{display:flex;gap:6px;padding:8px 10px;background:#f0f2f5;border-bottom:1px solid #eee;flex-wrap:wrap;align-items:center;}
.student-picker-actions .pick-info{font-size:12px;color:var(--text-light);margin-left:auto;}
.student-picker-list{max-height:260px;overflow-y:auto;padding:4px 0;}
.student-pick-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:.15s;font-size:13px;border-bottom:1px solid #f5f5f5;}
.student-pick-item:hover{background:#f0f4ff;}
.student-pick-item.checked{background:rgba(67,97,238,.06);}
.student-pick-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--pri);cursor:pointer;flex-shrink:0;}
.student-pick-item .pick-name{font-weight:600;flex:1;}
.student-pick-item .pick-class{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(67,97,238,.08);color:var(--pri);font-weight:600;}
.student-pick-item .pick-id{font-size:11px;color:var(--text-light);}
.student-picker-empty{padding:20px;text-align:center;color:var(--text-light);font-size:13px;}
.class-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:2px;background:rgba(67,97,238,.08);color:var(--pri);}
.selected-summary{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.selected-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(67,97,238,.1);color:var(--pri);}
.selected-chip .chip-remove{cursor:pointer;font-weight:700;margin-left:2px;color:var(--danger);font-size:13px;}
.selected-chip .chip-remove:hover{color:#c00;}

.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.85);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.loading-spinner{width:48px;height:48px;border:4px solid #e0e0e0;border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:15px;color:var(--text-light);font-weight:500;}

@media(max-width:768px){
.sidebar{transform:translateX(-100%);}
.sidebar.open{transform:translateX(0);}
.main-content{margin-left:0;}
.hamburger{display:block;}
.content-area{padding:16px;}
.stats-grid{grid-template-columns:1fr 1fr;}
.topic-grid{grid-template-columns:1fr;}
.modal{padding:20px;margin:10px;}
.preview-bar{flex-direction:column;align-items:flex-start;}
.form-row{grid-template-columns:1fr;}
}
@media(max-width:480px){
.stats-grid{grid-template-columns:1fr;}
.login-box{padding:24px;}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-container" class="toast-container"></div>
<div id="loading-overlay" class="loading-overlay hidden"><div class="loading-spinner"></div><div class="loading-text">載入中...</div></div>

<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
<script>
// ============================================================
// ⚙️  請在下面貼上你的 Google Apps Script 網頁應用程式 URL
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyWdHX-BJARdH_QL-gnjSWQ3FD2R49tQJFg3u2zgzxPVT3ALziqjrjZgUg9yxNcx__n/exec';
// ============================================================

// ==================== API LAYER ====================
async function apiCall(action, data) {
  try {
    const payload = Object.assign({action:action}, data||{});
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      redirect:'follow',
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    return JSON.parse(text);
  } catch(err) {
    console.error('API Error:', err);
    return {success:false,message:'網絡錯誤，請稍後再試'};
  }
}

function showLoading(msg){
  var el=document.getElementById('loading-overlay');
  if(msg){var t=el.querySelector('.loading-text');if(t)t.textContent=msg;}
  el.classList.remove('hidden');
}
function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden');}

async function reloadData(){
  var result = await apiCall('getAllData');
  if(result.success){
    var d=result.data;
    USERS={
      admins:d.users.filter(function(u){return u.role==='admin';}),
      teachers:d.users.filter(function(u){return u.role==='teacher';}),
      students:d.users.filter(function(u){return u.role==='student';})
    };
    QUESTIONS=d.questions;
    ASSIGNMENTS=d.assignments;
    RESULTS=d.results;
    var c=d.config||{};

function toast(msg,type){type=type||'info';var c=document.getElementById('toast-container');var t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;c.appendChild(t);setTimeout(function(){t.remove();},3000);}
function getScoreClass(p){return p>=70?'high':p>=40?'mid':'low';}
function getScoreColorClass(p){return p>=70?'score-high':p>=40?'score-mid':'score-low';}
function formatDate(){return new Date().toISOString().split('T')[0];}
function escapeHtml(s){if(s===undefined||s===null)return '';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function questionsByTopic(tid){return QUESTIONS.filter(function(q){return q.topicId===tid;});}
function questionById(id){return QUESTIONS.find(function(q){return q.id===id;});}
function getStudentResults(sid){return RESULTS.filter(function(r){return r.studentId===sid;});}
function nextQuestionId(){return QUESTIONS.length>0?Math.max.apply(null,QUESTIONS.map(function(q){return q.id;}))+1:1;}
function nextAssignmentId(){return 'A'+String(ASSIGNMENTS.length+1).padStart(3,'0');}
function normalizeOutput(s){if(s===undefined||s===null)return '';return String(s).replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();}
function generatePassword(len){len=len||8;var chars='abcdefghjkmnpqrstuvwxyz23456789';var p='';for(var i=0;i<len;i++)p+=chars[Math.floor(Math.random()*chars.length)];return p;}
function isAdmin(){return STATE.currentUser&&STATE.currentUser.role==='admin';}
function isManagement(){return STATE.currentUser&&(STATE.currentUser.role==='admin'||STATE.currentUser.role==='teacher');}
function getEffectiveUser(){if(STATE.previewMode&&STATE.previewStudentId){var s=USERS.students.find(function(s){return s.id===STATE.previewStudentId;});if(s)return Object.assign({},s,{role:'student'});}return STATE.currentUser;}
function isPreviewMode(){return STATE.currentUser&&isManagement()&&STATE.previewMode;}
function copyToClipboard(text){try{navigator.clipboard.writeText(text);toast('已複製','success');}catch(e){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('已複製','success');}}
function getAllClasses(){return Array.from(new Set(USERS.students.map(function(s){return s.class;}))).sort();}
function isAssignedToStudent(a,sid){if(!a.assignedStudents||a.assignedStudents.length===0)return true;if(a.assignedStudents.includes('all'))return true;return a.assignedStudents.includes(sid);}
function getAssignedCount(a){if(!a.assignedStudents||a.assignedStudents.includes('all'))return USERS.students.length;return a.assignedStudents.filter(function(sid){return USERS.students.find(function(s){return s.id===sid;});}).length;}
function getAssignedLabel(a){if(!a.assignedStudents||a.assignedStudents.includes('all'))return '全部學生';return getAssignedCount(a)+' 位學生';}
function getStudentAssignments(sid){return ASSIGNMENTS.filter(function(a){return isAssignedToStudent(a,sid);});}

let _pickerState={};
function initPickerState(pid,sel){_pickerState[pid]={selected:sel?sel.slice():['all'],filterClass:'all',search:''};}
function buildStudentPickerHTML(pid,selIds,fc,st){
  var classes=getAllClasses();var isAll=selIds.includes('all');var students=USERS.students.slice();
  if(fc&&fc!=='all')students=students.filter(function(s){return s.class===fc;});
  if(st){var q=st.toLowerCase();students=students.filter(function(s){return s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q);});}
  var cc=isAll?USERS.students.length:selIds.filter(function(sid){return USERS.students.find(function(s){return s.id===sid;});}).length;
  var h='<div class="student-picker" id="'+pid+'"><div class="student-picker-header"><input type="text" placeholder="🔍 搜尋學生..." value="'+escapeHtml(st||'')+'" oninput="onPickerSearch(\''+pid+'\',this.value)"><select onchange="onPickerClassFilter(\''+pid+'\',this.value)"><option value="all">所有班別</option>'+classes.map(function(c){return '<option value="'+c+'" '+(fc===c?'selected':'')+'>'+c+'</option>';}).join('')+'</select></div><div class="student-picker-actions"><button class="btn btn-sm '+(isAll?'btn-pri':'btn-outline')+'" onclick="onPickerSelectAll(\''+pid+'\')" style="font-size:11px;padding:4px 10px;"><i class="fas fa-check-double"></i> 全部</button><button class="btn btn-outline btn-sm" onclick="onPickerSelectClass(\''+pid+'\')" style="font-size:11px;padding:4px 10px;"><i class="fas fa-users"></i> 選班別</button><button class="btn btn-outline btn-sm" onclick="onPickerDeselectAll(\''+pid+'\')" style="font-size:11px;padding:4px 10px;"><i class="fas fa-times"></i> 清除</button><span class="pick-info"><i class="fas fa-user-check"></i> 已選 <strong>'+cc+'</strong> / '+USERS.students.length+'</span></div><div class="student-picker-list">';
  if(students.length===0){h+='<div class="student-picker-empty"><i class="fas fa-search"></i> 無結果</div>';}else{students.forEach(function(s){var ck=isAll||selIds.includes(s.id);h+='<label class="student-pick-item '+(ck?'checked':'')+'" onclick="event.preventDefault();onPickerToggle(\''+pid+'\',\''+s.id+'\')"><input type="checkbox" '+(ck?'checked':'')+' onclick="event.stopPropagation();" onchange="onPickerToggle(\''+pid+'\',\''+s.id+'\')"><span class="pick-name">'+escapeHtml(s.name)+'</span><span class="pick-id">'+s.id+'</span><span class="pick-class">'+s.class+'</span></label>';});}
  h+='</div></div>';
  if(isAll){h+='<div class="selected-summary" style="margin-top:8px;"><span class="selected-chip" style="background:rgba(6,214,160,.1);color:#05a67c;"><i class="fas fa-globe" style="font-size:10px;"></i> 全部學生 ('+USERS.students.length+')</span></div>';}
  else if(cc>0){h+='<div class="selected-summary" style="margin-top:8px;">';var grouped={};selIds.forEach(function(sid){var st=USERS.students.find(function(s){return s.id===sid;});if(st){if(!grouped[st.class])grouped[st.class]=[];grouped[st.class].push(st);}});Object.keys(grouped).sort().forEach(function(cls){h+='<span class="selected-chip"><strong>'+cls+'</strong>：'+grouped[cls].map(function(s){return s.name;}).join('、')+' <span class="chip-remove" onclick="onPickerRemoveClass(\''+pid+'\',\''+cls+'\')">✕</span></span>';});h+='</div>';}
  return h;
}
function onPickerSearch(pid,v){_pickerState[pid].search=v;refreshPicker(pid);}
function onPickerClassFilter(pid,v){_pickerState[pid].filterClass=v;refreshPicker(pid);}
function onPickerSelectAll(pid){_pickerState[pid].selected=['all'];refreshPicker(pid);}
function onPickerSelectClass(pid){var ps=_pickerState[pid];if(ps.filterClass==='all'){ps.selected=['all'];}else{if(ps.selected.includes('all'))ps.selected=USERS.students.map(function(s){return s.id;});USERS.students.filter(function(s){return s.class===ps.filterClass;}).forEach(function(s){if(!ps.selected.includes(s.id))ps.selected.push(s.id);});}refreshPicker(pid);}
function onPickerDeselectAll(pid){_pickerState[pid].selected=[];refreshPicker(pid);}
function onPickerToggle(pid,sid){var ps=_pickerState[pid];if(ps.selected.includes('all')){ps.selected=USERS.students.map(function(s){return s.id;}).filter(function(id){return id!==sid;});}else{var idx=ps.selected.indexOf(sid);if(idx>=0)ps.selected.splice(idx,1);else ps.selected.push(sid);}if(ps.selected.length===USERS.students.length&&!ps.selected.includes('all')){if(USERS.students.every(function(s){return ps.selected.includes(s.id);}))ps.selected=['all'];}refreshPicker(pid);}
function onPickerRemoveClass(pid,cls){var ps=_pickerState[pid];if(ps.selected.includes('all')){ps.selected=USERS.students.filter(function(s){return s.class!==cls;}).map(function(s){return s.id;});}else{var rem=USERS.students.filter(function(s){return s.class===cls;}).map(function(s){return s.id;});ps.selected=ps.selected.filter(function(id){return!rem.includes(id);});}refreshPicker(pid);}
function refreshPicker(pid){var ps=_pickerState[pid];var el=document.getElementById(pid);if(!el)return;var w=el.parentElement;if(!w)return;w.innerHTML=buildStudentPickerHTML(pid,ps.selected,ps.filterClass,ps.search);}

function renderQuiz(){
  var quiz=STATE.currentQuiz;if(!quiz)return '<p>無測驗資料</p>';var qs=quiz.questions;var total=qs.length;var answered=Object.keys(STATE.quizAnswers).length;var progress=STATE.quizSubmitted?100:Math.round(answered/total*100);
  var html='<div class="quiz-container"><div class="quiz-header"><h3>'+escapeHtml(quiz.name)+'</h3><span style="font-size:14px;color:var(--text-light)">'+answered+'/'+total+' 已作答</span></div><div class="quiz-progress"><div class="quiz-progress-bar" style="width:'+progress+'%"></div></div>';
  qs.forEach(function(q,idx){var ua=STATE.quizAnswers[q.id];html+='<div class="question-card" id="q-'+q.id+'"><span class="question-num">第 '+(idx+1)+' 題（'+q.marks+' 分）</span><div class="question-text">'+escapeHtml(q.question)+'</div>';if(q.code)html+='<div class="code-block">'+escapeHtml(q.code)+'</div>';
    if(q.type==='mc'){html+='<div class="options">';var letters='ABCD';q.options.forEach(function(opt,oi){var cls='';if(STATE.quizSubmitted){if(oi===q.answer)cls='correct';else if(ua!==undefined&&ua===oi)cls='wrong';}else if(ua===oi)cls='selected';html+='<div class="option '+cls+'" onclick="'+(STATE.quizSubmitted?'':'selectAnswer('+q.id+','+oi+')')+'"><span class="option-letter">'+letters[oi]+'</span><span>'+escapeHtml(opt)+'</span></div>';});html+='</div>';}
    else if(q.type==='output'){html+='<div class="form-group" style="margin-top:8px;"><label>請輸入程式的輸出結果：</label><textarea class="answer-input" rows="3" id="ans-'+q.id+'" '+(STATE.quizSubmitted?'disabled':'')+' oninput="textAnswer('+q.id+',this.value)" placeholder="在此輸入...">'+(ua!==undefined?escapeHtml(ua):'')+'</textarea></div>';if(STATE.quizSubmitted){var ok=normalizeOutput(ua)===normalizeOutput(q.correctOutput);html+='<div style="margin-top:8px;"><span style="color:'+(ok?'var(--success)':'var(--danger)')+';font-weight:600">'+(ok?'✓ 正確':'✗ 錯誤')+'</span><div class="code-block">'+escapeHtml(q.correctOutput)+'</div></div>';}}
    if(STATE.quizSubmitted&&q.explanation)html+='<div class="explanation"><strong>解釋：</strong>'+escapeHtml(q.explanation)+'</div>';html+='</div>';});

  else{html+=renderQuizResultSummary();html+='<div style="text-align:center;padding:20px 0;"><button class="btn btn-pri" onclick="navigate(\'student-dashboard\')"><i class="fas fa-home"></i> 返回主頁</button></div>';}
  html+='</div>';return html;

function renderQuizResultSummary(){

async function doLogin(){
  var role=document.getElementById('login-role').value;
  var username=document.getElementById('login-user').value.trim();
  var password=document.getElementById('login-pass').value;
  if(!username||!password){toast('請輸入用戶名稱和密碼','error');return;}
  showLoading('正在登入...');
  var result=await apiCall('login',{username:username,password:password,role:role});
  if(!result.success){hideLoading();toast(result.message||'登入失敗','error');return;}
  STATE.currentUser=result.user;
  showLoading('正在載入資料...');
  var dataResult=await reloadData();
  if(!dataResult.success){hideLoading();toast('無法載入資料','error');return;}
  // Auto-seed default data if empty
  if(USERS.students.length===0&&QUESTIONS.length===0){
    showLoading('首次使用，正在初始化預設資料...');
    await seedDefaultData();
  }
  STATE.view=role==='student'?'student-dashboard':'management-dashboard';
  STATE.managementTab='results';STATE.previewMode=false;
  hideLoading();toast('歡迎回來，'+result.user.name+'！','success');render();
}

function doLogout(){STATE.currentUser=null;STATE.view='login';STATE.sidebarOpen=false;STATE.previewMode=false;STATE.previewStudentId=null;render();}
function navigate(view){STATE.view=view;STATE.sidebarOpen=false;render();window.scrollTo(0,0);}
function toggleSidebar(){STATE.sidebarOpen=!STATE.sidebarOpen;document.getElementById('sidebar')?.classList.toggle('open',STATE.sidebarOpen);}
function enterPreview(){if(USERS.students.length===0){toast('沒有學生','error');return;}STATE.previewMode=true;STATE.previewStudentId=STATE.previewStudentId||USERS.students[0].id;STATE.view='student-dashboard';STATE.sidebarOpen=false;STATE.quizAnswers={};STATE.quizSubmitted=false;STATE.currentQuiz=null;render();}
function enterPreviewAs(sid){STATE.previewMode=true;STATE.previewStudentId=sid;STATE.view='student-dashboard';STATE.sidebarOpen=false;STATE.quizAnswers={};STATE.quizSubmitted=false;STATE.currentQuiz=null;render();}
function switchPreviewStudent(sid){STATE.previewStudentId=sid;STATE.view='student-dashboard';STATE.quizAnswers={};STATE.quizSubmitted=false;STATE.currentQuiz=null;render();}
function exitPreview(){STATE.previewMode=false;STATE.view='management-dashboard';STATE.sidebarOpen=false;STATE.quizAnswers={};STATE.quizSubmitted=false;STATE.currentQuiz=null;render();}
function openTopic(tid){STATE.currentTopic=tid;STATE.view='topic-questions';render();}
function startTopicQuiz(tid){var qs=questionsByTopic(tid);if(qs.length===0){toast('暫無題目','error');return;}var t=TOPICS.find(function(t){return t.id===tid;});STATE.currentQuiz={name:t.name+' — 練習',questions:qs,topicId:tid,assignmentId:null};STATE.quizAnswers={};STATE.quizSubmitted=false;STATE.view='quiz';render();}
function startAssignment(aid){var a=ASSIGNMENTS.find(function(a){return a.id===aid;});if(!a)return;var qs=a.questionIds.map(function(qid){return questionById(qid);}).filter(Boolean);if(qs.length===0){toast('暫無題目','error');return;}STATE.currentQuiz={name:a.name,questions:qs,topicId:null,assignmentId:a.id};STATE.quizAnswers={};STATE.quizSubmitted=false;STATE.view='quiz';render();}
function selectAnswer(qid,oi){if(STATE.quizSubmitted)return;STATE.quizAnswers[qid]=oi;render();}
function textAnswer(qid,val){STATE.quizAnswers[qid]=val;}
function viewResult(rid){STATE.selectedResult=rid;STATE.view='quiz-result';render();}

function submitQuiz(){var quiz=STATE.currentQuiz;var qs=quiz.questions;var un=qs.filter(function(q){return STATE.quizAnswers[q.id]===undefined||STATE.quizAnswers[q.id]==='';});if(un.length>0){confirmDialog('確認提交','你仍有 '+un.length+' 題未作答，確定提交？',doSubmitQuiz);return;}doSubmitQuiz();}

async function doSubmitQuiz(){
  var quiz=STATE.currentQuiz;var qs=quiz.questions;STATE.quizSubmitted=true;
  var score=0,total=0;qs.forEach(function(q){total+=q.marks;if(q.type==='mc'&&STATE.quizAnswers[q.id]===q.answer)score+=q.marks;else if(q.type==='output'&&normalizeOutput(STATE.quizAnswers[q.id])===normalizeOutput(q.correctOutput))score+=q.marks;});
  var pct=total>0?Math.round(score/total*100):0;var eu=getEffectiveUser();var ip=isPreviewMode();
  var result={id:'R'+Date.now(),studentId:eu.id,studentName:eu.name,studentClass:eu.class,assignmentId:quiz.assignmentId||'',topicId:quiz.topicId||'',quizName:quiz.name,questions:qs,answers:STATE.quizAnswers,score:score,total:total,percentage:pct,date:formatDate(),isPreview:ip};
  // Save to API
  await apiCall('addResult',result);
  RESULTS.push(result);
  if(!ip)submitToGoogleForm(result);
  toast('已提交！得分：'+score+'/'+total+' ('+pct+'%)','success');render();window.scrollTo(0,0);
}

async function createAssignment(){

});}

// ==================== BATCH OPERATIONS ====================
function showBatchActions(){var classes=getAllClasses();showModal('<h3><i class="fas fa-cogs" style="color:var(--sec)"></i> 批量操作</h3><div class="modal-section"><h4><i class="fas fa-key"></i> 批量重設密碼</h4><div class="form-row"><div class="form-group"><label>班別</label><select id="batch-class"><option value="all">所有</option>'+classes.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('')+'</select></div><div class="form-group"><label>密碼</label><select id="batch-pwd-mode"><option value="default">統一 123456</option><option value="studentid">用學號</option><option value="random">隨機</option></select></div></div><button class="btn btn-warn btn-sm" onclick="doBatchResetPassword()"><i class="fas fa-key"></i> 執行</button></div><hr class="modal-divider"><div class="modal-section"><h4><i class="fas fa-exchange-alt"></i> 批量修改班別</h4><div class="form-row"><div class="form-group"><label>原班別</label><select id="batch-from-class">'+classes.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('')+'</select></div><div class="form-group"><label>新班別</label><input id="batch-to-class" type="text" placeholder="5A"></div></div><button class="btn btn-pri btn-sm" onclick="doBatchChangeClass()"><i class="fas fa-exchange-alt"></i> 執行</button></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">關閉</button></div>');}

async function doBatchResetPassword(){
  var cls=document.getElementById('batch-class').value;var mode=document.getElementById('batch-pwd-mode').value;
  var targets=USERS.students.slice();if(cls!=='all')targets=targets.filter(function(s){return s.class===cls;});
  if(targets.length===0){toast('無學生','error');return;}
  var updates=targets.map(function(s){var np;if(mode==='default')np='123456';else if(mode==='studentid')np=s.id.toLowerCase();else np=generatePassword();return{id:s.id,password:np};});
  showLoading('正在重設密碼...');await apiCall('batchUpdateUsers',{updates:updates});await reloadData();hideLoading();closeModal();toast('已重設 '+targets.length+' 位學生密碼','success');render();
}

async function doBatchChangeClass(){
  var from=document.getElementById('batch-from-class').value;var to=document.getElementById('batch-to-class').value.trim();
  if(!to){toast('請輸入新班別','error');return;}
  var targets=USERS.students.filter(function(s){return s.class===from;});if(targets.length===0){toast('無學生','error');return;}
  var updates=targets.map(function(s){return{id:s.id,class:to};});
  showLoading('正在修改班別...');await apiCall('batchUpdateUsers',{updates:updates});await reloadData();hideLoading();closeModal();toast('已轉移 '+targets.length+' 人至 '+to,'success');render();
}

// ==================== QUESTION CRUD ====================
function showAddQuestion(){showModal('<h3>新增題目</h3><div class="form-group"><label>課題</label><select id="nq-topic">'+TOPICS.map(function(t){return '<option value="'+t.id+'">'+t.name+'</option>';}).join('')+'</select></div><div class="form-group"><label>題型</label><select id="nq-type" onchange="toggleNQType()"><option value="mc">選擇題</option><option value="output">輸出題</option></select></div><div class="form-group"><label>分數</label><input id="nq-marks" type="number" value="2" min="1" max="10"></div><div class="form-group"><label>題目</label><textarea id="nq-question" rows="3"></textarea></div><div class="form-group"><label>程式碼</label><textarea id="nq-code" rows="4" style="font-family:monospace;"></textarea></div><div id="nq-mc-fields"><div class="form-group"><label>A</label><input id="nq-optA" type="text"></div><div class="form-group"><label>B</label><input id="nq-optB" type="text"></div><div class="form-group"><label>C</label><input id="nq-optC" type="text"></div><div class="form-group"><label>D</label><input id="nq-optD" type="text"></div><div class="form-group"><label>正確答案</label><select id="nq-answer"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select></div></div><div id="nq-output-fields" class="hidden"><div class="form-group"><label>正確輸出</label><textarea id="nq-output" rows="3" style="font-family:monospace;"></textarea></div></div><div class="form-group"><label>解釋</label><textarea id="nq-explain" rows="2"></textarea></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-pri" onclick="addQuestion()">新增</button></div>');}
function toggleNQType(){var t=document.getElementById('nq-type').value;document.getElementById('nq-mc-fields').classList.toggle('hidden',t!=='mc');document.getElementById('nq-output-fields').classList.toggle('hidden',t!=='output');}

async function addQuestion(){
  var topicId=parseInt(document.getElementById('nq-topic').value),type=document.getElementById('nq-type').value,marks=parseInt(document.getElementById('nq-marks').value)||2,question=document.getElementById('nq-question').value.trim(),code=document.getElementById('nq-code').value,explanation=document.getElementById('nq-explain').value.trim();
  if(!question){toast('請輸入題目','error');return;}
  var q={id:nextQuestionId(),topicId:topicId,type:type,marks:marks,question:question,code:code,explanation:explanation};
  if(type==='mc'){q.options=['nq-optA','nq-optB','nq-optC','nq-optD'].map(function(id){return document.getElementById(id).value.trim();});q.answer=parseInt(document.getElementById('nq-answer').value);if(q.options.some(function(o){return!o;})){toast('請填寫所有選項','error');return;}}
  else{q.correctOutput=document.getElementById('nq-output').value;if(!q.correctOutput.trim()){toast('請填寫正確輸出','error');return;}}
  showLoading('正在新增...');await apiCall('addQuestion',q);await reloadData();hideLoading();closeModal();toast('題目已新增','success');render();
}

function deleteQuestion(qid){confirmDialog('刪除題目','確定刪除？',async function(){
  showLoading('正在刪除...');await apiCall('deleteQuestion',{id:qid});await reloadData();hideLoading();toast('已刪除','success');render();
});}

function showImportQuestions(){showModal('<h3>匯入題目 (JSON)</h3><div class="form-group"><label>貼上 JSON：</label><textarea id="import-json" rows="10" style="font-family:monospace;font-size:12px;"></textarea></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-pri" onclick="doImportQuestions()">匯入</button></div>');}

async function doImportQuestions(){
  try{var data=JSON.parse(document.getElementById('import-json').value);if(!Array.isArray(data))throw new Error('需要 JSON 陣列');
  var qs=data.map(function(q,i){q.id=nextQuestionId()+i;return q;});
  showLoading('正在匯入...');await apiCall('importQuestions',{questions:qs});await reloadData();hideLoading();closeModal();toast('匯入 '+qs.length+' 道題目','success');render();}catch(e){toast('JSON 格式錯誤','error');}
}

// ==================== GOOGLE FORM ====================
async function saveGFormConfig(){
  var config={formUrl:document.getElementById('gf-url').value.trim(),entryStudentName:document.getElementById('gf-name').value.trim(),entryStudentId:document.getElementById('gf-id').value.trim(),entryClass:document.getElementById('gf-class').value.trim(),entryAssignment:document.getElementById('gf-assign').value.trim(),entryScore:document.getElementById('gf-score').value.trim(),entryTotal:document.getElementById('gf-total').value.trim(),entryPercent:document.getElementById('gf-pct').value.trim(),entryDate:document.getElementById('gf-date').value.trim()};
  showLoading('正在儲存...');await apiCall('saveConfig',{config:config});GFORM=config;hideLoading();toast('設定已儲存','success');
}

function submitToGoogleForm(result){if(!GFORM.formUrl)return;try{var d=new FormData();if(GFORM.entryStudentName)d.append(GFORM.entryStudentName,result.studentName);if(GFORM.entryStudentId)d.append(GFORM.entryStudentId,result.studentId);if(GFORM.entryClass)d.append(GFORM.entryClass,result.studentClass);if(GFORM.entryAssignment)d.append(GFORM.entryAssignment,result.quizName);if(GFORM.entryScore)d.append(GFORM.entryScore,result.score);if(GFORM.entryTotal)d.append(GFORM.entryTotal,result.total);if(GFORM.entryPercent)d.append(GFORM.entryPercent,result.percentage);if(GFORM.entryDate)d.append(GFORM.entryDate,result.date);fetch(GFORM.formUrl,{method:'POST',mode:'no-cors',body:d}).catch(function(){});}catch(e){}}

function exportCSV(){var rows=[['學生編號','姓名','班別','功課','得分','總分','百分比','日期']];var filtered=RESULTS.filter(function(r){return!r.isPreview;});if(STATE.filterClass!=='all')filtered=filtered.filter(function(r){return r.studentClass===STATE.filterClass;});if(STATE.filterAssignment!=='all')filtered=filtered.filter(function(r){return r.assignmentId===STATE.filterAssignment;});filtered.forEach(function(r){rows.push([r.studentId,r.studentName,r.studentClass,r.quizName,r.score,r.total,r.percentage+'%',r.date]);});var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){return '"'+c+'"';}).join(',');}).join('\n');var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='DSE_ICT_成績_'+formatDate()+'.csv';a.click();URL.revokeObjectURL(url);toast('CSV 已匯出','success');}

// ==================== CODE RUNNER ====================
function runCode(){var code=document.getElementById('code-editor').value;var outputEl=document.getElementById('code-output');var inputsEl=document.getElementById('code-inputs');var inputs=inputsEl?inputsEl.value.split('\n'):[];var inputIdx=0;outputEl.textContent='正在執行...';outputEl.className='code-output';if(typeof Sk==='undefined'){outputEl.textContent='⚠ Skulpt 未載入';outputEl.className='code-output error';return;}var output=[];Sk.configure({output:function(t){output.push(t);},read:function(x){if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined)throw "File not found: '"+x+"'";return Sk.builtinFiles["files"][x];},inputfun:function(){if(inputIdx<inputs.length)return inputs[inputIdx++];return '';},inputfunTakesPrompt:true,__future__:Sk.python3});Sk.misceval.asyncToPromise(function(){return Sk.importMainWithBody("<stdin>",false,code,true);}).then(function(){outputEl.textContent=output.join('')||'(無輸出)';outputEl.className='code-output';}).catch(function(err){outputEl.textContent='❌ '+err.toString();outputEl.className='code-output error';});}
function clearCode(){document.getElementById('code-editor').value='';document.getElementById('code-output').textContent='等待執行...';document.getElementById('code-output').className='code-output';}

// ==================== POST RENDER ====================
function postRender(){
  document.querySelectorAll('.main-content').forEach(function(el){el.addEventListener('click',function(){if(STATE.sidebarOpen){STATE.sidebarOpen=false;document.getElementById('sidebar')?.classList.remove('open');}});});
  var lp=document.getElementById('login-pass');if(lp)lp.addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
}
